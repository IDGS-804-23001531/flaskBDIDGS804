{% extends "layout.html" %}
{% block container %}
{% import "_macros.html" as macros %}

<div class="flex justify-center min-h-screen px-4 pt-10 pb-32">

    <div
        class="relative bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-gray-200 transition hover:shadow-2xl">

        <!-- Botón Dropdown -->
        <button id="dropdownButton" data-dropdown-toggle="dropdown"
            class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-full p-2 transition">
            <span class="sr-only">Open dropdown</span>
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                    d="M6 12h.01M12 12h.01M18 12h.01" />
            </svg>
        </button>

        <!-- Dropdown Menu -->
        <div id="dropdown"
            class="z-10 hidden absolute right-4 top-14 bg-white border border-gray-200 rounded-xl shadow-md w-40">
            <ul class="p-2 text-sm text-gray-700 font-medium">
                <li>
                    <a href="#" class="block p-2 rounded-md hover:bg-gray-100 transition">Editar</a>
                </li>
                <li>
                    <a href="#" class="block p-2 rounded-md hover:bg-gray-100 transition">Exportar</a>
                </li>
                <li>
                    <a href="#" class="block p-2 rounded-md text-red-500 hover:bg-red-50 transition">Eliminar</a>
                </li>
            </ul>
        </div>

        <!-- Contenido -->
        <div class="flex flex-col items-center text-center">

            <!-- Imagen -->
            <div style="width:300px; height:300px;"
                class="rounded-full overflow-hidden border-4 border-blue-100 shadow-lg">
                <img src="{{ url_for('static', filename='img/cursos.png') }}"
                    alt="Curso"
                    class="w-full h-full object-cover">
            </div>

            <!-- Nombre del curso -->
            <h2 class="mt-6 text-2xl font-bold text-gray-800">
                {{ nombre }}
            </h2>

            <!-- Maestro -->
            <p class="mt-2 text-gray-500 text-sm">
                Maestro: {{ maestro }}
            </p>

            <!-- Descripción -->
            <p class="mt-4 text-gray-600 text-sm px-4">
                {{ descripcion }}
            </p>

            <!-- Línea -->
            <div class="w-16 h-1 bg-blue-500 rounded-full mt-4 mb-6"></div>

            <!-- Botón -->
            <button type="button" onclick="window.location.href='/cursos'"
                class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl shadow-md hover:shadow-lg transition">
                Regresar
            </button>

        </div>

    </div>
</div>

{% endblock %}
